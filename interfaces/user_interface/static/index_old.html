<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBin - Tri Interactif</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .waiting {
            text-align: center;
            color: white;
        }

        .waiting h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .task-screen {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        .task-screen.hidden {
            display: none;
        }

        .item-display {
            font-size: 64px;
            margin-bottom: 40px;
            animation: slideIn 0.5s ease;
        }

        .item-name {
            font-size: 56px;
            font-weight: bold;
            color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
            margin-bottom: 60px;
            animation: slideIn 0.5s ease;
        }

        .bin-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 900px;
            width: 100%;
            padding: 40px;
            animation: slideUp 0.6s ease 0.2s backwards;
        }

        .bin-button {
            aspect-ratio: 1;
            border: none;
            border-radius: 20px;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .bin-button:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .bin-button:active {
            transform: scale(0.95);
        }

        .bin-button.yellow {
            background: linear-gradient(135deg, #f39c12, #e67e22);
        }

        .bin-button.green {
            background: linear-gradient(135deg, #27ae60, #16a085);
        }

        .bin-button.brown {
            background: linear-gradient(135deg, #8b6914, #6c5510);
        }

        .bin-button.black {
            background: linear-gradient(135deg, #2c3e50, #34495e);
        }

        .bin-label {
            font-size: 20px;
            opacity: 0.9;
        }

        .error-button {
            margin-top: 40px;
            padding: 15px 40px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .error-button:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .success-screen {
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .success-screen h2 {
            font-size: 48px;
            color: white;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .checkmark {
            font-size: 100px;
            animation: scaleIn 0.6s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .image-preview {
            max-width: 300px;
            max-height: 300px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: slideIn 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="waiting" class="waiting">
            <h1>🗑️ SmartBin</h1>
            <p>En écoute des détections...</p>
            <div class="spinner"></div>
        </div>

        <div id="taskScreen" class="task-screen hidden">
            <img id="itemImage" class="image-preview" style="display:none;">
            <div class="item-name" id="itemName"></div>
            
            <p style="color: white; font-size: 24px; margin-bottom: 40px;">Quel bac choisir ?</p>
            
            <div class="bin-selector">
                <button class="bin-button yellow" onclick="selectBin('yellow')">
                    <span>♻️</span>
                    <span class="bin-label">Recyclage</span>
                </button>
                <button class="bin-button green" onclick="selectBin('green')">
                    <span>🌱</span>
                    <span class="bin-label">Verre</span>
                </button>
                <button class="bin-button brown" onclick="selectBin('brown')">
                    <span>🌿</span>
                    <span class="bin-label">Biodéchets</span>
                </button>
                <button class="bin-button black" onclick="selectBin('black')">
                    <span>🗑️</span>
                    <span class="bin-label">Ordures</span>
                </button>
            </div>
            
            <button class="error-button" onclick="rejectItem()">❌ Erreur / Indécis</button>
        </div>

        <div id="successScreen" class="task-screen hidden success-screen">
            <div class="checkmark">✅</div>
            <h2 id="successMessage">Tri effectué !</h2>
            <p style="color: white; font-size: 20px;">Attente du prochain objet...</p>
        </div>
    </div>

    <script>
        let currentTaskId = null;
        let currentItemName = null;
        let currentImagePath = null;

        // Démarrer le polling des tâches
        function pollTasks() {
            fetch('/api/tasks')
                .then(r => r.json())
                .then(data => {
                    if (data.success && data.pending.length > 0) {
                        const task = data.pending[0];
                        showTask(task);
                    } else {
                        showWaiting();
                        setTimeout(pollTasks, 1000);
                    }
                })
                .catch(() => {
                    setTimeout(pollTasks, 2000);
                });
        }

        function showWaiting() {
            document.getElementById('waiting').style.display = 'flex';
            document.getElementById('taskScreen').classList.add('hidden');
            document.getElementById('successScreen').classList.add('hidden');
        }

        function showTask(task) {
            currentTaskId = task.task_id;
            currentItemName = task.item_name;
            currentImagePath = task.image_path || null;

            document.getElementById('itemName').textContent = currentItemName.toUpperCase();
            
            const imgElement = document.getElementById('itemImage');
            if (currentImagePath) {
                imgElement.src = `/api/image/${currentImagePath}`;
                imgElement.style.display = 'block';
            } else {
                imgElement.style.display = 'none';
            }

            document.getElementById('waiting').style.display = 'none';
            document.getElementById('taskScreen').classList.remove('hidden');
            document.getElementById('successScreen').classList.add('hidden');
        }

        function selectBin(binColor) {
            if (!currentTaskId) return;

            fetch(`/api/answer/${currentTaskId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bin_color: binColor })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showSuccess(binColor);
                }
            });
        }

        function rejectItem() {
            if (!currentTaskId) return;

            fetch(`/api/answer/${currentTaskId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bin_color: null })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showWaiting();
                    setTimeout(pollTasks, 2000);
                }
            });
        }

        function showSuccess(binColor) {
            const messages = {
                'yellow': '♻️ Mis dans le bac de recyclage !',
                'green': '🥤 Mis dans le bac de verre !',
                'brown': '🌿 Mis dans le bac de biodéchets !',
                'black': '🗑️ Mis dans le bac d\'ordures !'
            };

            const container = document.querySelector('.container');
            const colors = { 'yellow': '#f39c12', 'green': '#27ae60', 'brown': '#8b6914', 'black': '#2c3e50' };
            container.style.background = `linear-gradient(135deg, ${colors[binColor]}, ${colors[binColor]})`;

            document.getElementById('successMessage').textContent = messages[binColor];
            document.getElementById('taskScreen').classList.add('hidden');
            document.getElementById('successScreen').classList.remove('hidden');

            setTimeout(() => {
                container.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                showWaiting();
                pollTasks();
            }, 3000);
        }

        // Démarrer au chargement
        pollTasks();
    </script>
</body>
</html>
